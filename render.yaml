databases:
  - name: support-desk-db
    plan: starter
    databaseName: support_desk
    user: support

services:
  # Next.js Web App
  - type: web
    name: support-desk-web
    runtime: node
    plan: starter
    buildCommand: ./scripts/render-build.sh
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: support-desk-db
          property: connectionString
      - key: NEXTAUTH_URL
        sync: false  # Set manually in Render dashboard
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
    disk:
      name: uploads
      mountPath: /opt/render/project/src/public/uploads
      sizeGB: 1

  # Email Sync Background Worker
  - type: worker
    name: support-desk-worker
    runtime: node
    plan: starter
    buildCommand: npm install --legacy-peer-deps && npx prisma generate
    startCommand: npx tsx workers/email-sync.ts
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: support-desk-db
          property: connectionString
      - key: ENCRYPTION_KEY
        fromService:
          name: support-desk-web
          type: web
          envVarKey: ENCRYPTION_KEY
